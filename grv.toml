# grv.toml — hook configuration for the grv project
# Hooks run per-file and inject output into the meta dictionary.
#
# Namespace routing examples (requires running daemon):
#   grv ast_list daemon              # list all decls in ./daemon/
#   grv ast_list .                   # list all decls in the current package
#   grv 'ast_list' 'daemon#Server'   # list decls in the file containing Server
#   grv ast_directory hooks          # inventory ./hooks/ directory
#   grv 'ast_query' 'daemon#Server' --path '[{"kind":"TypeSpec","name":"Server"}]'
#
# Note: use single quotes around arguments containing # to prevent shell comment interpretation.

[[hooks]]
name      = "lth"
command   = ["~/bin/lth", "--json", "search", "{namespace}", "--layers", "L3,L4", "--top", "5"]
scope     = "file"
cache     = true
# immutable = true means output is deterministic for a given git HEAD hash.
# When set, the git-hash cache is used instead of the mtime cache.
# cache = true is superseded at runtime by immutable = true, but harmless to leave set.
immutable = true
timeout   = "10s"
